  .stats {

  .stat {

// Pay period: 10 work days, Monday through following Friday (2 calendar weeks).
// Anchor: Monday March 16, 2026 is a known pay period start.
// Cycle: 14 calendar days. Start = Monday of cycle. End = start + 11 (Friday of week 2).
// Advances automatically every other Monday forever.
const PAY_PERIOD_ANCHOR = new Date('2026-03-16T00:00:00');

function getPayPeriod() {
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  const diffMs = now.getTime() - PAY_PERIOD_ANCHOR.getTime();
  const diffDays = Math.floor(diffMs / 86400000);
  const cycleDay = ((diffDays % 14) + 14) % 14;
  const start = new Date(now);
  start.setDate(start.getDate() - cycleDay);
  const end = new Date(start);
  end.setDate(end.getDate() + 11); // Monday + 11 = Friday of week 2
  return {
    start: start.toISOString().split('T')[0],
    end: end.toISOString().split('T')[0],
  };
}

function getWeekStart() {
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  const day = now.getDay();
  const diff = day === 0 ? 6 : day - 1;
  const mon = new Date(now);
  mon.setDate(mon.getDate() - diff);
  return mon.toISOString().split('T')[0];
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function startOfDayISO() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d.toISOString();
}

function fmtDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric',
  });
}

function fmtDateRange(start, end) {
  const s = new Date(start + 'T00:00:00');
  const e = new Date(end + 'T00:00:00');
  const opts = { month: 'short', day: 'numeric' };
  return s.toLocaleDateString('en-US', opts) + ' — ' + e.toLocaleDateString('en-US', opts);
}

function fmtShortDate(ts) {
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function esc(s) {
  const el = document.createElement('span');
  el.textContent = s;

// ===== REPRICER: Mock Data & Engine =====

  { asin: 'B000P0J0AQ', sku: 'DVD-004', title: 'The Dark Knight (2008)', current_price: 15.49, min_price: 8.50, max_price: 24.99, cost_basis: 5.00, sales_rank: 120000, date_listed: '2026-03-01', last_sold: null, last_repriced: null, status: 'active' },
  { asin: 'B001AQO3QA', sku: 'DVD-005', title: 'Forrest Gump (1994)', current_price: 10.99, min_price: 8.50, max_price: 24.99, cost_basis: 3.00, sales_rank: 650000, date_listed: '2026-02-01', last_sold: null, last_repriced: '2026-03-15T08:00:00Z', status: 'active' },
  { asin: 'B00AEFYIKQ', sku: 'DVD-006', title: 'Inception (2010)', current_price: 18.75, min_price: 8.50, max_price: 24.99, cost_basis: 4.50, sales_rank: 95000, date_listed: '2026-03-10', last_sold: '2026-03-25T16:45:00Z', last_repriced: null, status: 'active' },

  { asin: 'B00G4RKQ0M', sku: 'DVD-008', title: 'Interstellar (2014)', current_price: 22.00, min_price: 8.50, max_price: 24.99, cost_basis: 6.00, sales_rank: 55000, date_listed: '2026-03-20', last_sold: null, last_repriced: null, status: 'active' },

  { asin: 'B00K19SD8Q', sku: 'DVD-010', title: 'Guardians of the Galaxy (2014)', current_price: 11.50, min_price: 8.50, max_price: 24.99, cost_basis: 4.25, sales_rank: 88000, date_listed: '2026-03-05', last_sold: '2026-03-28T13:20:00Z', last_repriced: '2026-03-25T09:00:00Z', status: 'active' },
];

let repricerListings = JSON.parse(JSON.stringify(MOCK_LISTINGS));
let repricerLog = [];

const REPRICER_RULES = [
  { id: 1, rule_name: 'Default Floors', is_active: true, days_before_drop: null, drop_amount: null, max_hit_raise_amount: null, target_position: null, notes: 'Min $8.50, Max $24.99 for all listings unless overridden' },
  { id: 2, rule_name: 'Max Hit Day 1', is_active: true, days_before_drop: null, drop_amount: null, max_hit_raise_amount: 3.00, target_position: null, notes: 'If listing hits max price on day 1, raise max by configured amount' },
  { id: 3, rule_name: 'Stale Inventory', is_active: true, days_before_drop: 30, drop_amount: 0.50, max_hit_raise_amount: null, target_position: null, notes: 'Drop min price after configured days without a sale' },
  { id: 4, rule_name: 'Never Below Cost', is_active: true, days_before_drop: null, drop_amount: null, max_hit_raise_amount: null, target_position: null, notes: 'No rule can drop price below cost_basis' },
  { id: 5, rule_name: 'Sales Rank Guard', is_active: true, days_before_drop: null, drop_amount: null, max_hit_raise_amount: null, target_position: 500000, notes: 'Do not reprice downward if sales rank above threshold' },
];

function runRepricerEngine() {
  const now = new Date();
  const newLogEntries = [];

  for (const listing of repricerListings) {
    if (listing.status !== 'active') continue;

    let newPrice = listing.current_price;
    let reason = null;

    // Rule 1: Default Floors
    const r1 = REPRICER_RULES.find(r => r.rule_name === 'Default Floors');
    if (r1 && r1.is_active) {
      if (newPrice < listing.min_price) {
        newPrice = listing.min_price;
        reason = 'Default Floors: price below minimum, raised to min';
      }
      if (newPrice > listing.max_price) {
        newPrice = listing.max_price;
        reason = 'Default Floors: price above maximum, lowered to max';
      }
    }

    // Rule 2: Max Hit Day 1
    const r2 = REPRICER_RULES.find(r => r.rule_name === 'Max Hit Day 1');
    if (r2 && r2.is_active) {
      const dateListed = new Date(listing.date_listed + 'T00:00:00');
      const daysSinceListed = Math.floor((now - dateListed) / 86400000);
      const raiseAmount = parseFloat(r2.max_hit_raise_amount) || 3.00;
      if (daysSinceListed <= 1 && listing.current_price >= listing.max_price) {
        listing.max_price = parseFloat((listing.max_price + raiseAmount).toFixed(2));
        reason = 'Max Hit Day 1: hit max on day 1, raised max to $' + listing.max_price.toFixed(2) + ' (+$' + raiseAmount.toFixed(2) + ')';
      }
    }

    // Rule 3: Stale Inventory
    const r3 = REPRICER_RULES.find(r => r.rule_name === 'Stale Inventory');
    if (r3 && r3.is_active) {
      const daysBefore = parseInt(r3.days_before_drop) || 30;
      const dropAmount = parseFloat(r3.drop_amount) || 0.50;
      const dateListed = new Date(listing.date_listed + 'T00:00:00');
      const daysActive = Math.floor((now - dateListed) / 86400000);
      const lastSold = listing.last_sold ? new Date(listing.last_sold) : null;
      const daysSinceSale = lastSold ? Math.floor((now - lastSold) / 86400000) : daysActive;
      if (daysSinceSale >= daysBefore) {
        const droppedPrice = parseFloat((newPrice - dropAmount).toFixed(2));
        if (droppedPrice < newPrice) {
          newPrice = droppedPrice;
          reason = 'Stale Inventory: ' + daysSinceSale + ' days without sale, dropped $' + dropAmount.toFixed(2);
        }
      }
    }

    // Rule 4: Never Below Cost
    const r4 = REPRICER_RULES.find(r => r.rule_name === 'Never Below Cost');
    if (r4 && r4.is_active) {
      if (newPrice < listing.cost_basis) {
        newPrice = listing.cost_basis;
        reason = 'Never Below Cost: price floored at cost basis $' + listing.cost_basis.toFixed(2);
      }
    }

    // Rule 5: Sales Rank Guard
    const r5 = REPRICER_RULES.find(r => r.rule_name === 'Sales Rank Guard');
    if (r5 && r5.is_active) {
      const threshold = parseInt(r5.target_position) || 500000;
      if (listing.sales_rank > threshold && newPrice < listing.current_price) {
        newPrice = listing.current_price;
        reason = 'Sales Rank Guard: rank ' + listing.sales_rank.toLocaleString() + ' above ' + threshold.toLocaleString() + ', blocked downward reprice';
      }
    }

    // Final bounds
    newPrice = Math.max(newPrice, listing.min_price);
    newPrice = Math.min(newPrice, listing.max_price);
    newPrice = parseFloat(newPrice.toFixed(2));

    if (newPrice !== listing.current_price) {
      newLogEntries.push({
        asin: listing.asin,
        sku: listing.sku,
        old_price: listing.current_price,
        new_price: newPrice,
        reason: reason || 'Price adjusted within bounds',
        timestamp: now.toISOString(),
      });
      listing.current_price = newPrice;
      listing.last_repriced = now.toISOString();
    }
  }

  repricerLog = newLogEntries.concat(repricerLog).slice(0, 50);
  return newLogEntries;
}

function renderRepricer() {
  const now = new Date();
  const active = repricerListings.filter(l => l.status === 'active');
  const avgPrice = active.length > 0
    ? (active.reduce((s, l) => s + l.current_price, 0) / active.length).toFixed(2)
    : '0.00';
  const atMin = active.filter(l => l.current_price <= l.min_price).length;
  const atMax = active.filter(l => l.current_price >= l.max_price).length;

  return `
    <section class="section" id="repricer-section">
      <h2>Repricer</h2>
      <div class="repricer-nav">
        <button class="active" onclick="switchRepricerTab('overview')">Overview</button>
        <button onclick="switchRepricerTab('listings')">Listings</button>
        <button onclick="switchRepricerTab('rules')">Rules</button>
        <button onclick="switchRepricerTab('log')">Log</button>
      </div>

      <!-- OVERVIEW TAB -->
      <div class="repricer-tab active" id="repricer-overview">
        <div class="repricer-summary">
          <div class="stat">
            <div class="stat-val blue">${active.length}</div>
            <div class="stat-lbl">Active Listings</div>
          </div>
          <div class="stat">
            <div class="stat-val">$${avgPrice}</div>
            <div class="stat-lbl">Avg Price</div>
          </div>
          <div class="stat">
            <div class="stat-val red">${atMin}</div>
            <div class="stat-lbl">At Min Price</div>
          </div>
          <div class="stat">
            <div class="stat-val green">${atMax}</div>
            <div class="stat-lbl">At Max Price</div>
          </div>
        </div>
        <div class="repricer-actions">
          <button class="btn-reprice primary" onclick="handleRunRepricer()">Run Repricing Engine</button>
          <button class="btn-reprice secondary" onclick="handleResetRepricer()">Reset Mock Data</button>
        </div>
        <div class="repricer-status" id="repricer-status"></div>
        <!-- Quick log preview -->
        ${repricerLog.length > 0 ? `
          <h3 style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;margin-top:8px;">Recent Changes</h3>
          <div class="table-wrap"><table>
            <thead><tr><th>Time</th><th>SKU</th><th>Old</th><th>New</th><th>Reason</th></tr></thead>
            <tbody>${repricerLog.slice(0, 5).map(e => `
              <tr>
                <td>${new Date(e.timestamp).toLocaleTimeString()}</td>
                <td>${esc(e.sku)}</td>
                <td>$${e.old_price.toFixed(2)}</td>
                <td class="${e.new_price > e.old_price ? 'price-up' : 'price-down'}">$${e.new_price.toFixed(2)}</td>
                <td class="log-reason">${esc(e.reason)}</td>
              </tr>
            `).join('')}</tbody>
          </table></div>
        ` : '<div class="empty">No price changes yet. Run the engine to test.</div>'}
      </div>

      <!-- LISTINGS TAB -->
      <div class="repricer-tab" id="repricer-listings">
        <div class="table-wrap"><table>
          <thead><tr>
            <th>ASIN</th><th>SKU</th><th>Title</th><th>Price</th><th>Min</th><th>Max</th><th>Rank</th><th>Days Active</th><th>Last Repriced</th>
          </tr></thead>
          <tbody>${repricerListings.map(l => {
            const daysActive = Math.floor((now - new Date(l.date_listed + 'T00:00:00')) / 86400000);
            const repriced = l.last_repriced ? new Date(l.last_repriced).toLocaleDateString() : '--';
            const atMinCls = l.current_price <= l.min_price ? ' red' : '';
            const atMaxCls = l.current_price >= l.max_price ? ' green' : '';
            return `<tr>
              <td style="font-family:monospace;font-size:12px;">${esc(l.asin)}</td>
              <td>${esc(l.sku)}</td>
              <td>${esc(l.title)}</td>
              <td class="${atMinCls}${atMaxCls}" style="font-weight:600;">$${l.current_price.toFixed(2)}</td>
              <td>$${l.min_price.toFixed(2)}</td>
              <td>$${l.max_price.toFixed(2)}</td>
              <td>${l.sales_rank ? l.sales_rank.toLocaleString() : '--'}</td>
              <td>${daysActive}d</td>
              <td>${repriced}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>

      <!-- RULES TAB -->
      <div class="repricer-tab" id="repricer-rules">
        <div class="rules-list">
          ${REPRICER_RULES.map((rule, i) => `
            <div class="rule-card">
              <div class="rule-toggle">
                <label class="toggle-switch">
                  <input type="checkbox" ${rule.is_active ? 'checked' : ''} onchange="toggleRule(${i}, this.checked)">
                  <span class="toggle-slider"></span>

                <div class="rule-desc">${esc(rule.notes)}</div>
                <div class="rule-fields">
                  ${rule.rule_name === 'Max Hit Day 1' ? `
                    <div class="rule-field">
                      <label>Raise Amount ($)</label>
                      <input type="number" step="0.50" min="0" value="${rule.max_hit_raise_amount || 3.00}" onchange="updateRuleField(${i}, 'max_hit_raise_amount', this.value)">
                    </div>
                  ` : ''}
                  ${rule.rule_name === 'Stale Inventory' ? `
                    <div class="rule-field">
                      <label>Days Before Drop</label>
                      <input type="number" step="1" min="1" value="${rule.days_before_drop || 30}" onchange="updateRuleField(${i}, 'days_before_drop', this.value)">
                    </div>
                    <div class="rule-field">
                      <label>Drop Amount ($)</label>
                      <input type="number" step="0.25" min="0" value="${rule.drop_amount || 0.50}" onchange="updateRuleField(${i}, 'drop_amount', this.value)">
                    </div>
                  ` : ''}
                  ${rule.rule_name === 'Sales Rank Guard' ? `
                    <div class="rule-field">
                      <label>Rank Threshold</label>
                      <input type="number" step="50000" min="0" value="${rule.target_position || 500000}" onchange="updateRuleField(${i}, 'target_position', this.value)">
                    </div>
                  ` : ''}
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- LOG TAB -->
      <div class="repricer-tab" id="repricer-log">
        ${repricerLog.length === 0
          ? '<div class="empty">No repricing log entries yet. Run the engine to generate entries.</div>'
          : `<div class="table-wrap"><table>
              <thead><tr><th>Timestamp</th><th>ASIN</th><th>SKU</th><th>Old Price</th><th>New Price</th><th>Reason</th></tr></thead>
              <tbody>${repricerLog.map(e => `
                <tr>
                  <td>${new Date(e.timestamp).toLocaleString()}</td>
                  <td style="font-family:monospace;font-size:12px;">${esc(e.asin)}</td>
                  <td>${esc(e.sku)}</td>
                  <td>$${e.old_price.toFixed(2)}</td>
                  <td class="${e.new_price > e.old_price ? 'price-up' : 'price-down'}" style="font-weight:600;">$${e.new_price.toFixed(2)}</td>
                  <td class="log-reason">${esc(e.reason)}</td>
                </tr>
              `).join('')}</tbody>
            </table></div>`
        }
      </div>
    </section>
  `;
}

function switchRepricerTab(tab) {
  document.querySelectorAll('.repricer-nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.repricer-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('repricer-' + tab).classList.add('active');
  const tabNames = ['overview', 'listings', 'rules', 'log'];
  const idx = tabNames.indexOf(tab);
  if (idx >= 0) {
    document.querySelectorAll('.repricer-nav button')[idx].classList.add('active');
  }
}

function toggleRule(index, active) {
  REPRICER_RULES[index].is_active = active;
}

function updateRuleField(index, field, value) {
  REPRICER_RULES[index][field] = parseFloat(value) || parseInt(value) || 0;
}

function handleRunRepricer() {
  const entries = runRepricerEngine();
  const section = document.getElementById('repricer-section');
  const parent = section.parentElement;
  section.outerHTML = renderRepricer();
  // Show status
  const status = document.getElementById('repricer-status');
  if (entries.length > 0) {
    status.className = 'repricer-status success';
    status.textContent = 'Engine complete: ' + entries.length + ' price change' + (entries.length !== 1 ? 's' : '') + ' applied.';
  } else {
    status.className = 'repricer-status info';
    status.textContent = 'Engine complete: no price changes needed.';
  }
}

function handleResetRepricer() {
  repricerListings = JSON.parse(JSON.stringify(MOCK_LISTINGS));
  repricerLog = [];
  REPRICER_RULES[0].is_active = true;
  REPRICER_RULES[1].is_active = true; REPRICER_RULES[1].max_hit_raise_amount = 3.00;
  REPRICER_RULES[2].is_active = true; REPRICER_RULES[2].days_before_drop = 30; REPRICER_RULES[2].drop_amount = 0.50;
  REPRICER_RULES[3].is_active = true;
  REPRICER_RULES[4].is_active = true; REPRICER_RULES[4].target_position = 500000;
  const section = document.getElementById('repricer-section');
  section.outerHTML = renderRepricer();
  const status = document.getElementById('repricer-status');
  status.className = 'repricer-status info';
  status.textContent = 'Mock data reset to defaults.';
}

async function loadDashboard() {
  const today = todayISO();
  const sod = startOfDayISO();
  const pp = getPayPeriod();
  const weekStart = getWeekStart();

  const [
    todayLogs, ppLogs, shipDoneToday, shipDonePP,
    todayTimesheets, ppTimesheets,
    batches, shipCosts, supplies,
  ] = await Promise.all([
    query('daily_log', `select=result&timestamp=gte.${sod}`),
    query('daily_log', `select=result,timestamp&timestamp=gte.${pp.start}T00:00:00&timestamp=lte.${pp.end}T23:59:59`),
    query('shipments_completed', `select=id&date=eq.${today}`),
    query('shipments_completed', `select=id&date=gte.${pp.start}&date=lte.${pp.end}`),
    query('timesheet', `select=*&date=eq.${today}&order=time_in.asc`),
    query('timesheet', `select=*&date=gte.${pp.start}&date=lte.${pp.end}&order=time_in.asc`),
    query('shipments_ready', `select=*&order=timestamp.desc&limit=30`),
    query('shipments_completed', `select=date,placement_fee,shipping_fee&date=gte.${pp.start}&date=lte.${pp.end}`),
    query('supply_tracker', `select=*&order=item.asc`),
  ]);

  // Daily overview
  const passed = todayLogs.filter(r => r.result === 'Pass').length;
  const failed = todayLogs.filter(r => r.result === 'Fail').length;
  const total = todayLogs.length;
  const passRate = total > 0 ? Math.round((passed / total) * 100) : 0;
  const shipCount = shipDoneToday.length;

  // Pay period overview
  const ppPassed = ppLogs.filter(r => r.result === 'Pass').length;
  const ppFailed = ppLogs.filter(r => r.result === 'Fail').length;
  const ppTotal = ppLogs.length;
  const ppRate = ppTotal > 0 ? Math.round((ppPassed / ppTotal) * 100) : 0;
  const ppShipCount = shipDonePP.length;

  // Employee status
  const employees = {};
  for (const emp of ['Scanner', 'Cleaner']) {
    const todayRows = todayTimesheets.filter(r => r.employee === emp);
    const ppRows = ppTimesheets.filter(r => r.employee === emp);
    const weekRows = ppRows.filter(r => r.date >= weekStart);
    const hoursToday = todayRows.reduce((s, r) => s + (parseFloat(r.hours_worked) || 0), 0);
    const hoursWeek = weekRows.reduce((s, r) => s + (parseFloat(r.hours_worked) || 0), 0);
    const hoursPP = ppRows.reduce((s, r) => s + (parseFloat(r.hours_worked) || 0), 0);
    const last = todayRows[todayRows.length - 1];
    const clockedIn = last ? (last.time_in && !last.time_out) : false;
    employees[emp] = { clockedIn, hoursToday, hoursWeek, hoursPP };
  }

  // Costs - today, this week, pay period
  const todayCosts = shipCosts.filter(r => r.date === today);
  const weekCosts = shipCosts.filter(r => r.date >= weekStart);
  const costData = {
    tp: todayCosts.reduce((s, r) => s + (parseFloat(r.placement_fee) || 0), 0),
    ts: todayCosts.reduce((s, r) => s + (parseFloat(r.shipping_fee) || 0), 0),
    wp: weekCosts.reduce((s, r) => s + (parseFloat(r.placement_fee) || 0), 0),
    ws: weekCosts.reduce((s, r) => s + (parseFloat(r.shipping_fee) || 0), 0),
    pp: shipCosts.reduce((s, r) => s + (parseFloat(r.placement_fee) || 0), 0),
    ps: shipCosts.reduce((s, r) => s + (parseFloat(r.shipping_fee) || 0), 0),
  };

  // Supply alerts
  const alerts = supplies.filter(s => s.current_stock <= s.order_trigger);

  // Render
  const dateStr = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
  });
  const ppRange = fmtDateRange(pp.start, pp.end);

  const header = document.getElementById('header');
  header.style.display = '';
  header.innerHTML = `
    <h1>DVD Hub — Owner Dashboard</h1>
    <div class="page-meta">
      <span>${esc(dateStr)}</span>
      <span>Pay Period: ${ppRange}</span>
      <span>Auto-refreshes every 60s</span>
    </div>
  `;

  const app = document.getElementById('app');
  app.className = '';
  app.innerHTML = `
    <div class="content">
      <!-- Daily + Pay Period Overviews side by side -->
      <div class="row">
        <section class="section">
          <h2>Daily Overview <span class="h2-sub">Today</span></h2>
          <div class="stats">
            <div class="stat">
              <div class="stat-val">${total}</div>
              <div class="stat-lbl">Total Scans</div>
            </div>
            <div class="stat">
              <div class="stat-val green">${passed}</div>
              <div class="stat-lbl">Passes</div>
            </div>
            <div class="stat">
              <div class="stat-val red">${failed}</div>
              <div class="stat-lbl">Fails</div>
            </div>
            <div class="stat">
              <div class="stat-val">${passRate}%</div>
              <div class="stat-lbl">Pass Rate</div>
            </div>
            <div class="stat">
              <div class="stat-val blue">${shipCount}</div>
              <div class="stat-lbl">Shipments</div>
            </div>
          </div>
        </section>

        <section class="section">
          <h2>Pay Period Overview <span class="h2-sub">${ppRange}</span></h2>
          <div class="stats">
            <div class="stat">
              <div class="stat-val">${ppTotal}</div>
              <div class="stat-lbl">Total Scans</div>
            </div>
            <div class="stat">
              <div class="stat-val green">${ppPassed}</div>
              <div class="stat-lbl">Passes</div>
            </div>
            <div class="stat">
              <div class="stat-val red">${ppFailed}</div>
              <div class="stat-lbl">Fails</div>
            </div>
            <div class="stat">
              <div class="stat-val">${ppRate}%</div>
              <div class="stat-lbl">Pass Rate</div>
            </div>
            <div class="stat">
              <div class="stat-val blue">${ppShipCount}</div>
              <div class="stat-lbl">Shipments</div>
            </div>
          </div>
        </section>
      </div>

      <!-- Employee Status -->
      <section class="section">
        <h2>Employee Status</h2>
        <div class="emp-grid">
          ${['Scanner', 'Cleaner'].map((emp, i) => `
            <div class="emp-card">
              <div class="emp-header">
                <span class="emp-name">Employee ${i + 1}</span>
                <span class="emp-role">${emp}</span>
              </div>
              <div class="emp-status">
                <span class="dot ${employees[emp].clockedIn ? 'in' : 'out'}"></span>
                <span>${employees[emp].clockedIn ? 'Clocked In' : 'Clocked Out'}</span>
              </div>
              <div class="emp-hours-grid">
                <div class="emp-h-block">
                  <div class="emp-h-val">${employees[emp].hoursToday.toFixed(1)}h</div>
                  <div class="emp-h-lbl">Today</div>
                </div>
                <div class="emp-h-block">
                  <div class="emp-h-val">${employees[emp].hoursWeek.toFixed(1)}h</div>
                  <div class="emp-h-lbl">This Week</div>
                </div>
                <div class="emp-h-block">
                  <div class="emp-h-val">${employees[emp].hoursPP.toFixed(1)}h</div>
                  <div class="emp-h-lbl">Pay Period</div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </section>

      <!-- Shipments Pipeline -->
      <section class="section">
        <h2>Shipments Pipeline</h2>
        ${batches.length === 0
          ? '<div class="empty">No batches in pipeline</div>'
          : `<div class="table-wrap"><table>
              <thead><tr>
                <th>Date</th><th>Quantity</th><th>Status</th><th>SKUs Listed</th><th>Gap</th>
              </tr></thead>
              <tbody>${batches.map(b => {
                const gap = b.status === 'COMPLETED' && b.skus_listed != null
                  ? b.quantity - b.skus_listed : null;
                return `<tr>
                  <td>${fmtShortDate(b.timestamp)}</td>
                  <td>${b.quantity}</td>
                  <td><span class="badge ${b.status === 'READY' ? 'badge-ready' : 'badge-done'}">${esc(b.status)}</span></td>
                  <td>${b.skus_listed != null ? b.skus_listed : '--'}</td>
                  <td>${gap != null
                    ? `<span class="${gap > 0 ? 'red' : 'green'}">${gap > 0 ? gap + ' unlisted' : 'All listed'}</span>`
                    : '<span style="color:#555">--</span>'
                  }</td>
                </tr>`;
              }).join('')}</tbody>
            </table></div>`
        }
      </section>

      <!-- Shipment Costs -->
      <section class="section">
        <h2>Shipment Costs</h2>
        <div class="costs-grid">
          <div class="cost-block">
            <h4>Today</h4>
            <div class="cost-row"><span>Placement Fees</span><span>$${costData.tp.toFixed(2)}</span></div>
            <div class="cost-row"><span>Shipping Fees</span><span>$${costData.ts.toFixed(2)}</span></div>
            <div class="cost-row total"><span>Total</span><span>$${(costData.tp + costData.ts).toFixed(2)}</span></div>
          </div>
          <div class="cost-block">
            <h4>This Week</h4>
            <div class="cost-row"><span>Placement Fees</span><span>$${costData.wp.toFixed(2)}</span></div>
            <div class="cost-row"><span>Shipping Fees</span><span>$${costData.ws.toFixed(2)}</span></div>
            <div class="cost-row total"><span>Total</span><span>$${(costData.wp + costData.ws).toFixed(2)}</span></div>
          </div>
          <div class="cost-block">
            <h4>Pay Period</h4>
            <div class="cost-row"><span>Placement Fees</span><span>$${costData.pp.toFixed(2)}</span></div>
            <div class="cost-row"><span>Shipping Fees</span><span>$${costData.ps.toFixed(2)}</span></div>
            <div class="cost-row total"><span>Total</span><span>$${(costData.pp + costData.ps).toFixed(2)}</span></div>
          </div>
        </div>
      </section>

      <!-- Supply Alerts -->
      <section class="section">
        <h2>Supply Alerts</h2>
        ${alerts.length === 0
          ? '<div class="empty ok">All supplies above trigger levels</div>'
          : alerts.map(s => `
            <div class="alert-item">
              <span class="alert-name">${esc(s.item)}</span>
              <span class="alert-stock">${s.current_stock} ${esc(s.unit)}
                <span class="alert-trigger"> (trigger: ${s.order_trigger})</span>
              </span>
            </div>
          `).join('')
        }
      </section>

      <!-- Repricer Section -->
      ${renderRepricer()}
    </div>
  `;
}

loadDashboard();
setInterval(loadDashboard, 60000);
</script>
